services:
  - type: web
    name: campapp-api
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --legacy-peer-deps --include=dev && npm run build -w apps/api
    startCommand: node apps/api/dist/index.js
    envVars:
      - key: HUSKY
        value: "0"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
